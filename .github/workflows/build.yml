name: Gerar APK Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar o repositório
      uses: actions/checkout@v4

    - name: Configurar o Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Adicionar Chave da API do Gemini
      run: echo "apiKey=${{ secrets.gemini_api_key }}" > local.properties

    - name: Dar permissão ao Gradle
      run: chmod +x ./gradlew

    - name: Construir o Aplicativo
      run: ./gradlew assembleDebug

    - name: Organizar os arquivos APK
      run: |
        mkdir -p apk-upload
        find . -name "*.apk" -exec cp {} apk-upload/ \;

    - name: Salvar o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: App-Gemini-Pronto
        path: apk-upload/*.apk
